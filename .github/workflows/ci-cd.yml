name: nwm-verf CI/CD Pipeline

on:
  workflow_dispatch:
  push:
    branches: ['*']
    tags: ['*']
  pull_request:
    branches: [main, development]

permissions:
  contents: read
  packages: write
  security-events: write

env:
  REGISTRY: "ghcr.io"
  DOCKER_IMAGE_NAME: "ngwpc/nwm-verf"
  DOCKER_IMAGE_TAG: ${{ github.ref_name }}

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      image_base: ${{ steps.vars.outputs.image_base }}
      tag:        ${{ steps.vars.outputs.tag }}
    steps:
      - name: Compute image base and safe tag
        id: vars
        shell: bash
        run: |
          ORG="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          REPO="$(basename "${GITHUB_REPOSITORY}")"
          IMAGE_BASE="ghcr.io/${ORG}/${REPO}"
          RAW_TAG="${GITHUB_REF_NAME}"
          SAFE_TAG="$(echo "${RAW_TAG}" \
             | tr '[:upper:]' '[:lower:]' \
             | tr -c '[:alnum:]._-' '-' \
             | cut -c1-128)"
          SAFE_TAG="${SAFE_TAG%-}"   # trim trailing '-'
          [ -n "$SAFE_TAG" ] || SAFE_TAG="build"
          echo "image_base=${IMAGE_BASE}" >> "$GITHUB_OUTPUT"
          echo "tag=${SAFE_TAG}" >> "$GITHUB_OUTPUT"

  build:
    name: build
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image with tag (tag push)
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: ${{ needs.setup.outputs.image_base }}:${{ needs.setup.outputs.tag }}-test
          build-args: |
            NWM_EVAL_MGR_TAG=${{ needs.setup.outputs.tag }}

      - name: Build Docker image with tag (branch push/PR)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: ${{ needs.setup.outputs.image_base }}:${{ needs.setup.outputs.tag }}-test

  sonarqube:
    if: github.repository_owner == 'NGWPC'
    runs-on: self-hosted
    needs: [setup, build]
    continue-on-error: true
    container:
      image: sonarsource/sonar-scanner-cli
      options: --entrypoint="" --user 0
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: SonarQube Scan
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          sonar-scanner -X -Dsonar.verbose=true
          -Dproject.settings=sonar-project.properties
          -Dsonar.host.url="$SONAR_HOST_URL"
          -Dsonar.login="$SONAR_TOKEN"

  container_scanning:
    name: container_scanning
    needs: [setup, build, sonarqube]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image to scan
        run: docker pull ${{ needs.setup.outputs.image_base }}:${{ needs.setup.outputs.tag }}-test

      - name: Container Scanning
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ needs.setup.outputs.image_base }}:${{ needs.setup.outputs.tag }}-test
          format: sarif
          output: trivy-results.sarif
          severity: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Trivy scan results
        if: github.repository_visibility == 'public'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  deploy:
    name: deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/development'
    needs: [setup, build, container_scanning, sonarqube]
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push :latest
        run: |
          docker pull ${{ needs.setup.outputs.image_base }}:${{ needs.setup.outputs.tag }}-test
          docker tag  ${{ needs.setup.outputs.image_base }}:${{ needs.setup.outputs.tag }}-test ${{ needs.setup.outputs.image_base }}:latest
          docker push ${{ needs.setup.outputs.image_base }}:latest

  release:
    name: release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [setup, build, container_scanning, sonarqube]
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure image is tagged with ref_name (sanitized)
        run: |
          docker pull ${{ needs.setup.outputs.image_base }}:${{ needs.setup.outputs.tag }}-test
          docker tag  ${{ needs.setup.outputs.image_base }}:${{ needs.setup.outputs.tag }}-test ${{ needs.setup.outputs.image_base }}:${{ needs.setup.outputs.tag }}
          docker push ${{ needs.setup.outputs.image_base }}:${{ needs.setup.outputs.tag }}
