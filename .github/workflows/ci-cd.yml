on:
  push:
    branches: [development, main, release-candidate]
    tags: ['*']
  pull_request:

permissions:
  contents: read
  packages: write
  security-events: write

env:
  DOCKER_IMAGE_NAME: ghcr.io/${{ toLower(github.repository) }}
  DOCKER_IMAGE_TAG: ${{ github.ref_name }}

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    container: docker:latest
    steps:
      - uses: actions/checkout@v4

      - name: Set NWM_EVAL_MGR_TAG
        id: set_tag
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG_VALUE="${GITHUB_REF_NAME}"
          elif [[ "${GITHUB_REF_NAME}" == "release-candidate" || "${GITHUB_REF_NAME}" == "master" ]]; then
            TAG_VALUE="${GITHUB_REF_NAME}"
          else
            TAG_VALUE="development"
          fi
          echo "Resolved NWM_EVAL_MGR_TAG=${TAG_VALUE}"   # print to logs
          echo "tag=${TAG_VALUE}" >> $GITHUB_OUTPUT       # set step output

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and (for push events) push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.DOCKER_IMAGE_NAME }}:${{ env.DOCKER_IMAGE_TAG }}
          build-args: |
            NWM_EVAL_MGR_TAG=${{ steps.set_tag.outputs.tag }}

  container_scanning:
    name: container_scanning
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    container: docker:latest
    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: '${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

  deploy:
    name: deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/development'
    needs: [build, container_scanning]
    runs-on: ubuntu-latest
    container: docker:latest
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push :latest
        run: |
          docker pull ${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}
          docker tag  ${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }} ${{ env.DOCKER_IMAGE_NAME }}:latest
          docker push ${{ env.DOCKER_IMAGE_NAME }}:latest

  release:
    name: release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build, container_scanning]
    runs-on: ubuntu-latest
    container: docker:latest
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure image is tagged with ref_name
        run: |
          docker pull ${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}
          docker tag  ${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }} ${{ env.DOCKER_IMAGE_NAME }}:${{ env.DOCKER_IMAGE_TAG }}
          docker push ${{ env.DOCKER_IMAGE_NAME }}:${{ env.DOCKER_IMAGE_TAG }}
