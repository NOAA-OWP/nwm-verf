name: nwm-verf-mgr CI/CD Pipeline

on:
  push:
    branches: ['*']
    tags: ['*']
  pull_request:

permissions:
  contents: read
  packages: write
  security-events: write

env:
  REGISTRY: "ghcr.io"
  DOCKER_IMAGE_NAME: "ngwpc/nwm-verf-mgr"
  DOCKER_IMAGE_TAG: ${{ github.ref_name }}

jobs:
  build:
    name: build
    if: >
      startsWith(github.ref, 'refs/tags/') ||
      github.ref == 'refs/heads/development' ||
      github.ref == 'refs/heads/main' ||
      github.ref == 'refs/heads/release-candidate'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image with git tag for Docker tag
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.DOCKER_IMAGE_NAME }}:${{ env.DOCKER_IMAGE_TAG }}
          build-args: |
            # We are simply using the nwm-verf-mgr tag for NWM_EVAL_MGR_TAG (this is how it was done in GitLab)
            # We might need to pass in NWM_EVAL_MGR_TAG dynamically in the future
            NWM_EVAL_MGR_TAG=${{ env.DOCKER_IMAGE_TAG }}

      - name: Build Docker image with branch for Docker tag
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.DOCKER_IMAGE_NAME }}:${{ env.DOCKER_IMAGE_TAG }}


  container_scanning:
    name: container_scanning
    if: github.event_name == 'push'
    needs: build
    runs-on: self-hosted
    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: '${{ env.REGISTRY }}/${{ env.DOCKER_IMAGE_NAME }}:${{ env.DOCKER_IMAGE_TAG }}'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

  deploy:
    name: deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/development'
    needs: [build, container_scanning]
    runs-on: self-hosted
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push :latest
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.DOCKER_IMAGE_NAME }}:${{ env.DOCKER_IMAGE_TAG }}
          docker tag  ${{ env.REGISTRY }}/${{ env.DOCKER_IMAGE_NAME }}:${{ env.DOCKER_IMAGE_TAG }} ${{ env.REGISTRY }}/${{ env.DOCKER_IMAGE_NAME }}:latest
          docker push ${{ env.REGISTRY }}/${{ env.DOCKER_IMAGE_NAME }}:latest

  release:
    name: release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build, container_scanning]
    runs-on: self-hosted
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure image is tagged with ref_name
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.DOCKER_IMAGE_NAME }}:${{ env.DOCKER_IMAGE_TAG }}
          docker tag  ${{ env.REGISTRY }}/${{ env.DOCKER_IMAGE_NAME }}:${{ env.DOCKER_IMAGE_TAG }} ${{ env.REGISTRY }}/${{ env.DOCKER_IMAGE_NAME }}:${{ env.DOCKER_IMAGE_TAG }}
          docker push ${{ env.REGISTRY }}/${{ env.DOCKER_IMAGE_NAME }}:${{ env.DOCKER_IMAGE_TAG }}
