# This file is a template, and might need editing before it works on your project.
# This is a sample GitLab CI/CD configuration file that should run without any modifications.
# It demonstrates a basic 3 stage CI/CD pipeline. Instead of real tests or scripts,
# it uses echo commands to simulate the pipeline execution.
#
# A pipeline is composed of independent jobs that run scripts, grouped into stages.
# Stages run in sequential order, but jobs within stages run in parallel.
#
# For more information, see: https://docs.gitlab.com/ee/ci/yaml/index.html#stages
#
# You can copy and paste this template into a new `.gitlab-ci.yml` file.
# You should not add this template to an existing `.gitlab-ci.yml` file by using the `include:` keyword.
#
# To contribute improvements to CI/CD templates, please follow the Development guide at:
# https://docs.gitlab.com/ee/development/cicd/templates.html
# This specific template is located at:
# https://gitlab.com/gitlab-org/gitlab/-/blob/master/lib/gitlab/ci/templates/Getting-Started.gitlab-ci.yml


# GitLab CI/CD configuration file for ngen repository
include:
  - template: Jobs/Container-Scanning.gitlab-ci.yml


stages:
  - build
  - test
  - deploy
  - release

image: registry.sh.nextgenwaterprediction.com/infrastructure/docker/docker:latest

variables:
    DOCKER_IMAGE_NAME: $CI_REGISTRY_IMAGE
    DOCKER_IMAGE_TAG: $CI_COMMIT_REF_NAME-test

build:
  stage: build
  script:
    - echo "Building ${CI_PROJECT_NAME} docker image.. "
    - |
      DOCKER_ARG_PARAM=""
      if [[ -n "$CI_COMMIT_TAG" ]]; then
        DOCKER_ARG_PARAM="$CI_COMMIT_TAG"
      fi
      if [[ "$CI_COMMIT_BRANCH" == "release-candidate" ]] || [[ "$CI_COMMIT_BRANCH" == "master" ]]; then
        DOCKER_ARG_PARAM="$CI_COMMIT_BRANCH"
      fi
      if [[ -n "$DOCKER_ARG_PARAM" ]]; then
        echo "Running [ docker build --build-arg NGEN_EVAL_TAG="$DOCKER_ARG_PARAM" --secret id=GITLAB_TOKEN,env=GITLAB_TOKEN --tag "$DOCKER_IMAGE_NAME:$DOCKER_IMAGE_TAG" . ]"
        docker build --no-cache --build-arg NGEN_EVAL_TAG="$DOCKER_ARG_PARAM" --secret id=GITLAB_TOKEN,env=CI_JOB_TOKEN --tag "$DOCKER_IMAGE_NAME:$DOCKER_IMAGE_TAG" .
      else
        echo "Running [ docker build --secret id=GITLAB_TOKEN,env=GITLAB_TOKEN --tag "$DOCKER_IMAGE_NAME:$DOCKER_IMAGE_TAG" . ]"
        docker build --no-cache --secret id=GITLAB_TOKEN,env=CI_JOB_TOKEN --tag "$DOCKER_IMAGE_NAME:$DOCKER_IMAGE_TAG" .
      fi
    - echo "Logging in to Gitlab Container Registry..."
    - echo $CI_JOB_TOKEN | docker login -u $CI_REGISTRY_USER --password-stdin $CI_REGISTRY
    - docker push $DOCKER_IMAGE_NAME:$DOCKER_IMAGE_TAG
    - docker logout

container_scanning:
  stage: test
  needs:
    - build
  variables:
    SECURE_LOG_LEVEL: info
    CS_SEVERITY_THRESHOLD: UNKNOWN
    CS_IMAGE: $DOCKER_IMAGE_NAME:$DOCKER_IMAGE_TAG

deploy:
  stage: deploy
  script:
    - echo "Logging in to Gitlab Container Registry to push the image..."
    - echo $CI_JOB_TOKEN | docker login -u $CI_REGISTRY_USER --password-stdin $CI_REGISTRY
    - echo "Pushing to the docker registry"
    - docker tag $DOCKER_IMAGE_NAME:$DOCKER_IMAGE_TAG $DOCKER_IMAGE_NAME:latest
    - docker push $DOCKER_IMAGE_NAME:latest
    - docker logout
  rules:
    - if: '$CI_COMMIT_BRANCH == "development"'

release:
  stage: release
  script:
    - echo "Logging in to Gitlab Container Registry to push the image..."
    - echo $CI_JOB_TOKEN | docker login -u $CI_REGISTRY_USER --password-stdin $CI_REGISTRY
    - echo "Pushing to the docker registry"
    - docker tag $DOCKER_IMAGE_NAME:$DOCKER_IMAGE_TAG $DOCKER_IMAGE_NAME:$CI_COMMIT_TAG
    - docker push $DOCKER_IMAGE_NAME:$CI_COMMIT_TAG
    - docker logout
  rules:
    - if: $CI_COMMIT_TAG

